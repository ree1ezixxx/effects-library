<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cursor Trail — Line Follow (Obsidian Assembly)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f1eade;
    --ink:#151415;
    --accent:#7b5136;
  }
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Geist',system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
    cursor:none;
  }
  .stage{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:10vh 8vw;
    position:relative;
  }
  h1{
    font-weight:300;
    font-size:clamp(48px,9vw,152px);
    letter-spacing:-.04em;
    line-height:.92;
    max-width:14ch;
    text-align:center;
  }
  h1 em{
    font-style:italic;
    font-weight:300;
    color:var(--accent);
  }
  .meta{
    position:fixed;
    inset:auto 0 24px 0;
    display:flex;
    justify-content:space-between;
    padding:0 32px;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.55;
    pointer-events:none;
  }
  canvas#trail{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9999;
    background:transparent;
  }
  .dot{
    position:fixed;
    top:0;left:0;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--ink);
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:10000;
    mix-blend-mode:normal;
  }
</style>
</head>
<body>
  <section class="stage">
    <h1>Move the cursor<br/>to <em>imagine</em> the line</h1>
  </section>
  <section class="stage">
    <h1>A trail that <em>remembers</em><br/>where you've been</h1>
  </section>
  <div class="meta">
    <span>Effect 09 — Cursor Trail</span>
    <span>Source: obsidianassembly.com</span>
  </div>
  <canvas id="trail"></canvas>
  <div class="dot" id="dot"></div>

<script>
(() => {
  const canvas = document.getElementById('trail');
  const ctx = canvas.getContext('2d');
  const dot = document.getElementById('dot');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize(){
    canvas.width = innerWidth * DPR;
    canvas.height = innerHeight * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  addEventListener('resize', resize);

  const pts = [];
  const MAX_AGE = 650;      // ms a point stays alive
  const MIN_DIST = 2;       // min pixel gap before appending a new sample
  let mx = innerWidth/2, my = innerHeight/2;
  let lastX = mx, lastY = my;

  addEventListener('pointermove', e => {
    mx = e.clientX; my = e.clientY;
    const dx = mx - lastX, dy = my - lastY;
    if (dx*dx + dy*dy >= MIN_DIST*MIN_DIST) {
      pts.push({ x: mx, y: my, t: performance.now() });
      lastX = mx; lastY = my;
    }
  }, { passive: true });

  addEventListener('pointerleave', () => pts.length = 0);

  function frame(now){
    ctx.clearRect(0,0,innerWidth,innerHeight);

    // drop stale
    while (pts.length && now - pts[0].t > MAX_AGE) pts.shift();

    if (pts.length > 1) {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // Draw each segment with its own alpha + width so tail fades smoothly
      for (let i = 1; i < pts.length; i++){
        const p0 = pts[i-1], p1 = pts[i];
        const age = now - p1.t;
        const life = 1 - age / MAX_AGE;      // 1 = fresh, 0 = gone
        if (life <= 0) continue;
        const eased = life * life;            // quadratic fade
        ctx.strokeStyle = `rgba(21,20,21,${(0.55 * eased).toFixed(3)})`;
        ctx.lineWidth = 1.4 * eased + 0.2;
        ctx.beginPath();
        if (i > 1){
          const pm = pts[i-2];
          const cpx = (pm.x + p0.x) / 2;
          const cpy = (pm.y + p0.y) / 2;
          const ex  = (p0.x + p1.x) / 2;
          const ey  = (p0.y + p1.y) / 2;
          ctx.moveTo(cpx, cpy);
          ctx.quadraticCurveTo(p0.x, p0.y, ex, ey);
        } else {
          ctx.moveTo(p0.x, p0.y);
          ctx.lineTo(p1.x, p1.y);
        }
        ctx.stroke();
      }
    }

    dot.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
